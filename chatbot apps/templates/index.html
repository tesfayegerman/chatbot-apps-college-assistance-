<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 420px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; }
        .chat-header { background: #4e54c8; color: white; padding: 20px; text-align: center; }
        .chat-header h2 { font-size: 20px; }
        .chat-header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
        .chat-box { height: 420px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .bot-message { background: #f0f2f5; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-message { background: #4e54c8; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-input { display: flex; padding: 16px; border-top: 1px solid #eee; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 25px; outline: none; font-size: 14px; }
        .chat-input input:focus { border-color: #4e54c8; }
        .chat-input button { background: #4e54c8; color: white; border: none; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-size: 14px; }
        .chat-input button:hover { background: #3a3f99; }
        .typing { font-size: 12px; color: #999; padding: 0 20px 10px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🎓 College Chatbot</h2>
            <p>Ask me anything about the college!</p>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">👋 Hello! I am your College Assistant. How can I help you today?</div>
        </div>
        <div class="typing" id="typing"></div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKey(event)"/>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function handleKey(event) {
            if (event.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            appendMessage(message, 'user-message');
            input.value = '';

            document.getElementById('typing').textContent = 'Bot is typing...';

            const res = await fetch('/get', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });

            const data = await res.json();
            document.getElementById('typing').textContent = '';
            appendMessage(data.response, 'bot-message');
        }

        function appendMessage(text, className) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
